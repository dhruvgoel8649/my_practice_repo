version: '3.8'
services:
  backend:
    image: ${REGISTRY}/${ECR_BACKEND_REPO}:latest
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=*
    ports:
      - "8000:8000"
  frontend:
    image: ${REGISTRY}/${ECR_FRONTEND_REPO}:latest
    ports:
      - "80:80"
    depends_on:
      - backend
